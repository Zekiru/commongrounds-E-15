{% extends 'base.html' %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto; padding: 40px 60px;">

    <div style="text-align: center; margin-bottom: 35px;">
        <h2 style="font-weight: normal; color: #1e90ff; letter-spacing: 1px;">
            EVENT FORM
        </h2>
    </div>

    <hr>

    <form method="POST" enctype="multipart/form-data" style="margin-top: 35px;">
        {% csrf_token %}
        {{ form.as_p }}

        <div style="text-align: center; margin-top: 30px;">
            <button type="submit"
                style="background-color: #3498db; color: white; padding: 12px 35px; border: none; border-radius: 4px;">
                Save Event
            </button>
        </div>
    </form>

    <p style="margin-top: 30px;">
        <a href="{% url 'event_list' %}">Back to Events</a>
    </p>

</div>
{% endblock %}
