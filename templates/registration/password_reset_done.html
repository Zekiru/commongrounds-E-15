{% extends 'base.html' %}

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh] px-4">
    <div class="w-full max-w-md bg-white dark:bg-gray-800 p-8 rounded-xl shadow-md border border-gray-100 dark:border-gray-700 text-center">
        
        <h2 class="text-2xl font-bold mb-4 text-gray-900 dark:text-gray-50">Password Reset Sent</h2>
        
        <div class="space-y-4 text-gray-600 dark:text-gray-400 text-sm leading-relaxed">
            <p>
                We have emailed you instructions for setting your password, if an account exists with the email you entered. You should receive them shortly.
            </p>
        </div>

        <div class="mt-8">
            <a href="{% url 'login' %}" 
               class="text-sm font-semibold text-blue-600 dark:text-blue-400 hover:text-blue-500 transition-colors">
                Return to Login
            </a>
        </div>
        
    </div>
</div>
{% endblock %}
