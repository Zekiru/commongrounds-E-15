{% extends 'base.html' %}

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
    <div class="flex items-center justify-center min-h-[60vh] px-4">
    <div class="w-full max-w-md text-center bg-white dark:bg-gray-800 p-8 rounded-xl shadow-md border border-gray-100 dark:border-gray-700">

        <h2 class="text-2xl font-bold mb-2 text-gray-900 dark:text-gray-50">Password Reset Complete</h2>
        
        <p class="text-gray-600 dark:text-gray-400 mb-8">
            Your new password has been successfully set. You can now log in to your account.
        </p>

        <a href="{% url 'login' %}" 
           class="inline-block w-full py-2.5 px-4 font-bold text-white bg-blue-600 rounded-lg 
                  transition-all duration-200 cursor-pointer hover:bg-blue-700 active:scale-95 text-center">
            Login
        </a>
        
    </div>
</div>
{% endblock %}
