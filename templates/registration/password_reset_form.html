{% extends 'base.html' %}

{% block title %}Password Reset{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh] px-4">
    <div class="w-full max-w-sm bg-white dark:bg-gray-800 p-8 rounded-xl shadow-md border border-gray-100 dark:border-gray-700">
        
        <h2 class="text-2xl font-bold text-center mb-2 text-gray-900 dark:text-gray-50">Password Reset</h2>
        <p class="text-sm text-center text-gray-500 dark:text-gray-400 mb-6">
            Enter your email to receive a reset link.
        </p>

        <form method="POST" class="django-form-container">
            {% csrf_token %}

            <div class="space-y-1">
                {{ form.as_p }}
            </div>

            <button type="submit" 
                    class="w-full mt-4 py-2.5 px-4 font-bold text-white bg-blue-600 rounded-lg 
                           cursor-pointer transition-all duration-200 hover:bg-blue-700 active:scale-95">
                Send Reset Link
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="{% url 'login' %}" class="text-sm text-gray-500 hover:text-blue-600 transition-colors">
                Back to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
