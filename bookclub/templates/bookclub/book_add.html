{% extends 'base.html' %}

{% block title %}Add a Book{% endblock %}

{% block content %}
    <h2 style="text-align: center;"><a href="{% url 'bookclub:book_list' %}">
        BOOK CLUB LIBRARY
    </a></h2>
    <hr>
    <h2>Add a Book</h2>
    <form method="post" class="form-container">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="form-actions" style="align-items: center;">
            <button type="submit" class="btn">Create Book</button>
            <a href="{% url 'bookclub:book_list' %}" class="btn secondary">Cancel</a>
        </div>
    </form>
{% endblock %}
