{% extends 'base.html' %}

{% block title %}Account Update{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh] px-4 py-12">
    <div class="w-full max-w-md bg-white dark:bg-gray-800 p-8 rounded-xl shadow-md border border-gray-100 dark:border-gray-700">
        
        <h2 class="text-2xl font-bold text-center mb-6 text-gray-900 dark:text-gray-50">
            Edit Your Profile
        </h2>

        <form method="POST" class="django-form-container">
            {% csrf_token %}

            <div class="space-y-3">
                {{ form.as_p }}
            </div>

            <button type="submit" 
                    class="w-full mt-8 py-2.5 px-4 font-bold text-white bg-blue-600 rounded-lg 
                           cursor-pointer transition-all duration-200 hover:bg-blue-700 active:scale-95 shadow-sm">
                Save Changes
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="/" class="text-sm text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-colors">
                Cancel
            </a>
        </div>
    </div>
</div>
{% endblock %}
